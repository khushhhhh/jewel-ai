version: "3.9"

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jewel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jewel
      POSTGRES_PASSWORD: jewel_dev_password
      POSTGRES_DB: jewel_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jewel -d jewel_ai"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (S3-compatible local storage) ────────────────────
  minio:
    image: minio/minio:latest
    container_name: jewel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO bucket initializer ───────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: jewel-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/jewel-raw-uploads &&
        mc mb --ignore-existing local/jewel-processed &&
        mc anonymous set download local/jewel-raw-uploads &&
        mc anonymous set download local/jewel-processed &&
        echo 'Buckets created successfully'
      "

  # ── Redis (pub/sub for WebSocket bridge) ───────────────────
  redis:
    image: redis:7-alpine
    container_name: jewel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Inngest Dev Server ─────────────────────────────────────
  inngest:
    image: inngest/inngest:latest
    container_name: jewel-inngest
    restart: unless-stopped
    command: inngest dev -u http://host.docker.internal:8000/api/inngest
    ports:
      - "8288:8288"   # Dev Server UI + API
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  miniodata:
